name: CI (ingestion)

on:
  push:
    branches: [main]
    paths:
      - "ingestion/**"
      - ".github/workflows/ingestion-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"

  pull_request:
    branches: [main]
    paths:
      - "ingestion/**"
      - ".github/workflows/ingestion-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"

permissions:
  contents: read
  id-token: write

concurrency:
  group: ingestion-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (mypy/black/ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group ingestion --group dev --frozen

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: ty
        run: make ty app=ingestion

      - name: black (check)
        run: make black app=ingestion

      - name: ruff
        run: make ruff app=ingestion

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        marker: [unit, integration]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group ingestion --group dev --frozen

      - name: Run pytest (-m ${{ matrix.marker }})
        run: uv run pytest ./ingestion/tests/ -m ${{ matrix.marker }} -q

  build:
    name: Build image
    environment: prod
    needs: [lint, tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CI_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker auth
        run: |
          gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Build & Push
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE: wiki-ingestion
          TAG: ${{ github.sha }}
          STAGING_BUCKET: ${{ secrets.STAGING_BUCKET }}
        run: |
          gcloud beta builds submit \
            --config ingestion/cloudbuild.yaml \
            --gcs-source-staging-dir "gs://${STAGING_BUCKET}/source" \
            --substitutions=_TAG=$GITHUB_SHA,_IMAGE_NAME=$IMAGE \
            .

  deploy:
    name: Deploy
    environment: prod
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CI_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Delete previous run
        env:
          JOB_PREFIX: "wikistream-ingestion-"
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: "europe-west1"
        run: |
          set -euo pipefail

          echo ">> Cancel previous active Dataflow jobs with prefix ${JOB_PREFIX} in ${REGION}..."
          ACTIVE_JOB_IDS="$(gcloud dataflow jobs list \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --status=active \
            --format='value(id,name)' \
            | awk -v pfx="${JOB_PREFIX}" '$2 ~ "^"pfx {print $1}')"

          if [ -n "${ACTIVE_JOB_IDS}" ]; then
            echo "Found active jobs:"
            gcloud dataflow jobs list \
              --project "${PROJECT_ID}" \
              --region "${REGION}" \
              --status=active \
              --format='table[box](id,name,state)' \
              --filter="name:${JOB_PREFIX}*"

            # 2) Отменить (cancel) — быстро завершает job
            for JOB_ID in ${ACTIVE_JOB_IDS}; do
              echo "Cancelling job: ${JOB_ID}"
              gcloud dataflow jobs cancel "${JOB_ID}" \
                --project "${PROJECT_ID}" \
                --region "${REGION}" \
                --quiet || true
            done
          else
            echo "No active jobs found."
          fi

