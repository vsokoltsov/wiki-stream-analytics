name: dbt CI

on:
  pull_request:
    paths:
      - "dbt/**"
      - ".github/workflows/dbt.yml"
  push:
    branches: ["main"]
    paths:
      - "dbt/**"
      - ".github/workflows/dbt.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: dbt-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    env:
      DBT_UV_PROJECT_DIR: dbt
      DBT_PROJECT_DIR: dbt/wikistream_analytics
      DBT_VARS: '{"lookback_days": 7}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set env vars
        shell: bash
        run: |
          echo "DBT_PROFILES_DIR=${RUNNER_TEMP}/dbt-profiles" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: "access_token"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Write dbt profiles.yml (no keyfile)
        shell: bash
        run: |
          mkdir -p "${DBT_PROFILES_DIR}"
          cat > "${DBT_PROFILES_DIR}/profiles.yml" << 'YAML'
          wikistream_analytics:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: oauth
                project: wiki-stream-analytics
                dataset: wikistream_analytics
                location: EU
                threads: 2
                priority: interactive
                job_execution_timeout_seconds: 300
                job_retries: 1
          YAML

      - name: Sync dbt env (uv)
        working-directory: ${{ env.DBT_UV_PROJECT_DIR }}
        run: uv sync --frozen

      - name: dbt deps
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt deps

      - name: dbt parse
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt parse

      - name: dbt compile
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt compile --vars "${DBT_VARS}" --target dev

      - name: dbt debug
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt debug --target dev

      - name: dbt build (staging + tests)
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt build --select staging+ --vars "${DBT_VARS}" --target dev