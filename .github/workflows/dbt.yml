name: CI (dbt)

on:
  pull_request:
    paths:
      - "dbt/**"
      - ".github/workflows/dbt-ci.yml"

  push:
    branches: ["main"]
    paths:
      - "dbt/**"
      - ".github/workflows/dbt-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # нужно для OIDC

concurrency:
  group: dbt-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    env:
      DBT_UV_PROJECT_DIR: dbt
      DBT_PROJECT_DIR: dbt/wikistream_analytics
      DBT_PROFILES_DIR: ${{ runner.temp }}/dbt-profiles

      DBT_VARS: '{"lookback_days": 7}'

      # твой gcp project id
      GCP_PROJECT_ID: wiki-stream-analytics

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # OIDC auth -> Workload Identity Federation -> SA impersonation
      - name: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CI_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # dbt будет использовать ADC (Application Default Credentials) от auth step
      # profiles.yml создаём без keyfile
      - name: Write dbt profiles.yml (no keyfile)
        shell: bash
        run: |
          mkdir -p "${DBT_PROFILES_DIR}"
          cat > "${DBT_PROFILES_DIR}/profiles.yml" << ${{ secrets.PROFILES_YML }}
          echo "profiles.yml written to ${DBT_PROFILES_DIR}"

      - name: Sync dbt env (uv)
        working-directory: ${{ env.DBT_UV_PROJECT_DIR }}
        run: |
          uv sync --frozen

      - name: dbt deps
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: |
          uv run --project .. dbt deps

      - name: dbt parse (syntax & project structure)
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: |
          uv run --project .. dbt parse

      - name: dbt compile
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: |
          uv run --project .. dbt compile --vars "${DBT_VARS}" --target dev

      - name: dbt debug (connection)
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: |
          uv run --project .. dbt debug --target dev

      - name: dbt build (staging + tests)
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: |
          uv run --project .. dbt build --select staging+ --vars "${DBT_VARS}" --target dev

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            ${{ env.DBT_PROJECT_DIR }}/target/**
            ${{ env.DBT_PROJECT_DIR }}/logs/**
          if-no-files-found: warn