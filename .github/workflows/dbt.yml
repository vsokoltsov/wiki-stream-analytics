name: dbt CI

on:
  pull_request:
    paths:
      - "dbt/**"
      - ".github/workflows/dbt.yml"
  push:
    branches: ["main"]
    paths:
      - "dbt/**"
      - ".github/workflows/dbt.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: dbt-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    env:
      DBT_UV_PROJECT_DIR: dbt
      DBT_PROJECT_DIR: dbt/wikistream_analytics
      DBT_VARS: '{"lookback_days": 7}'

    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CI_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set env vars
        shell: bash
        run: |
          echo "DBT_PROFILES_DIR=${RUNNER_TEMP}/dbt-profiles" >> "$GITHUB_ENV"

      - name: Write dbt profiles.yml (no keyfile)
        shell: bash
        run: |
          mkdir -p "${DBT_PROFILES_DIR}"
          cat > "${DBT_PROFILES_DIR}/profiles.yml" << ${{ secrets.DBT_PROFILES_YML }}

      - name: Sync dbt env (uv)
        working-directory: ${{ env.DBT_UV_PROJECT_DIR }}
        run: uv sync --frozen

      - name: dbt deps
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt deps

      - name: dbt parse
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt parse

      - name: dbt compile
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt compile --vars "${DBT_VARS}" --target dev

      - name: dbt debug
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt debug --target dev

      - name: dbt build (staging + tests)
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt build --select staging+ --vars "${DBT_VARS}" --target dev