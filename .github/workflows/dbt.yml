name: CI (dbt)

on:
  push:
    branches: ["main"]
    paths:
      - "dbt/**"
      - ".github/workflows/dbt.yml"
  
  pull_request:
    paths:
      - "dbt/**"
      - ".github/workflows/dbt.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: dbt-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dbt-ci:
    name: dbt checks
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CI_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set env vars
        shell: bash
        run: |
          echo "DBT_PROFILES_DIR=${RUNNER_TEMP}/dbt-profiles" >> "$GITHUB_ENV"

      - name: Write dbt profiles.yml (no keyfile)
        shell: bash
        run: |
          mkdir -p "${DBT_PROFILES_DIR}"
          cat > "${DBT_PROFILES_DIR}/profiles.yml" << 'YAML'
          ${{ secrets.DBT_PROFILES_YML }}
          YAML

      - name: Sync dbt env (uv)
        env:
          DBT_PROJECT_DIR: dbt/wikistream_analytics
        working-directory: ${{ env.DBT_UV_PROJECT_DIR }}
        run: uv sync --frozen

      - name: dbt deps
        env:
          DBT_PROJECT_DIR: dbt/wikistream_analytics
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt deps --project-dir ${{ env.DBT_PROJECT_DIR }}

      - name: dbt parse
        env:
          DBT_PROJECT_DIR: dbt/wikistream_analytics
          DBT_VARS: '{"lookback_days": 7}'
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt parse --project-dir ${{ env.DBT_PROJECT_DIR }}

      - name: dbt compile
        env:
          DBT_PROJECT_DIR: dbt/wikistream_analytics
          DBT_VARS: '{"lookback_days": 7}'
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt compile --vars "${DBT_VARS}" --target dev --project-dir ${{ env.DBT_PROJECT_DIR }}

      - name: dbt debug
        env:
          DBT_PROJECT_DIR: dbt/wikistream_analytics
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt debug --target dev --project-dir ${{ env.DBT_PROJECT_DIR }}

      - name: dbt build (staging + tests)
        env:
          DBT_PROJECT_DIR: dbt/wikistream_analytics
          DBT_VARS: '{"lookback_days": 7}'
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: uv run --project .. dbt build --select staging+ --vars "${DBT_VARS}" --target dev --project-dir ${{ env.DBT_PROJECT_DIR }}