{{- $root := . -}}
{{- range $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name | quote }}
  namespace: {{ $svc.namespace | quote }}
  labels:
{{ include "edge-access.labels" $root | indent 4 }}
  annotations:
{{- with $root.Values.global.annotations }}
{{ toYaml . | indent 4 }}
{{- end }}
{{- with $svc.annotations }}
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  type: LoadBalancer
{{- if $svc.loadBalancerIP }}
  loadBalancerIP: {{ $svc.loadBalancerIP | quote }}
{{- end }}
{{- if $svc.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{ toYaml $svc.loadBalancerSourceRanges | indent 4 }}
{{- end }}
  externalTrafficPolicy: {{ default "Cluster" $svc.externalTrafficPolicy }}
  sessionAffinity: {{ default "None" $svc.sessionAffinity }}
  selector:
{{ toYaml $svc.selector | indent 4 }}
  ports:
{{ toYaml $svc.ports | indent 4 }}
---
{{- end }}
{{- end }}